<!DOCTYPE html>
<html>
<head>

<title>Student Record Management</title>

<link rel="stylesheet" href="style.css">

<script>

if(!localStorage.getItem("loggedIn")){
window.location.href="login.html";
}

</script>

</head>

<body>

<header>

<h1>Student Record Management System</h1>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="card">

<h2>Add Student</h2>

<form id="studentForm" class="studentForm">

<input type="text" id="name" placeholder="Student Name" required>

<input type="number" id="roll" placeholder="Roll Number" required>

<input type="text" id="dept" placeholder="Department" required>

<input type="number" id="marks" placeholder="Marks" required>

<button type="submit">Add Student</button>

</form>

</div>


<div class="card">

<h2>Search Student</h2>

<div class="searchBox">

<input type="number" id="searchRoll" placeholder="Enter Roll Number">

<button id="searchBtn">Search</button>

</div>

</div>


<div class="card">

<h2>Student Records</h2>

<h3>Total Students: <span id="studentCount">0</span></h3>

<table>

<thead>

<tr>
<th>Roll</th>
<th>Name</th>
<th>Dept</th>
<th>Marks</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<div class="card">

<h2>Sorting</h2>

<button id="sortMarks">Sort by Marks</button>
<button id="sortName">Sort by Name</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
